<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Devis</title>

<style>
:root { --dark-green:#1d3331; }
body { font-family: Arial; background:#f4f4f4; display:flex; justify-content:center; }
.container { width:850px; background:white; }

.header { display:flex; padding:20px; border-bottom:5px solid var(--dark-green); }
.slogan { background:var(--dark-green); color:white; text-align:center; padding:10px; }

.content { padding:20px; }

table { width:100%; border-collapse:collapse; }
th { background:var(--dark-green); color:white; padding:10px; }
td { border:1px solid #eee; }

input, select { width:100%; border:none; padding:5px; }

.total-box { width:300px; margin-left:auto; border:2px solid var(--dark-green); }
.row { display:flex; justify-content:space-between; padding:10px; }
.total { background:var(--dark-green); color:white; }

.no-print { margin:10px; }

@media print { .no-print { display:none; } }
</style>

</head>

<body>

<div class="container">

<div class="header">
<h1>FOUSSENY SERVICE</h1>
<div style="margin-left:auto">
DEVIS N° <input value="2026-001" style="width:100px;">
</div>
</div>

<div class="slogan">
Nous donnons un sens à votre maison avec les plafonds staff
</div>

<div class="content">

Client: <input><br><br>

<table id="table">
<thead>
<tr>
<th>Qté</th>
<th>Désignation</th>
<th>Prix</th>
<th>Montant</th>
</tr>
</thead>
<tbody></tbody>
</table>

<button onclick="addRow()" class="no-print">➕ Ajouter</button>

<div class="total-box">
<div class="row">
<span>Matériels</span>
<span id="materiel">0</span>
</div>

<div class="row">
<span>Main d'œuvre</span>
<input id="main" value="0" oninput="calc()">
</div>

<div class="row total">
<span>TOTAL</span>
<span id="total">0</span>
</div>
</div>

<button onclick="window.print()" class="no-print">🖨️ Imprimer</button>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
