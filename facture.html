<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Devis - Fousseny Service</title>

<style>
:root {
    --dark-green: #1d3331;
    --white: #ffffff;
    --light-bg: #f4f4f4;
}
body {
    font-family: Arial;
    background: var(--light-bg);
    display: flex;
    justify-content: center;
}
.facture-container {
    background: white;
    width: 850px;
    border: 1px solid #ddd;
}
.brand-header {
    display: flex;
    padding: 20px;
    border-bottom: 5px solid var(--dark-green);
}
.brand-name h1 {
    margin: 0;
    color: var(--dark-green);
}
.slogan-bar {
    background: var(--dark-green);
    color: white;
    text-align: center;
    padding: 10px;
}
.content {
    padding: 20px;
}
table {
    width: 100%;
    border-collapse: collapse;
}
th {
    background: var(--dark-green);
    color: white;
    padding: 10px;
}
td {
    border: 1px solid #eee;
}
input {
    width: 100%;
    border: none;
    padding: 5px;
}
.totals-table {
    width: 300px;
    margin-left: auto;
    border: 2px solid var(--dark-green);
}
.total-row {
    display: flex;
    justify-content: space-between;
    padding: 10px;
}
.total-grand {
    background: var(--dark-green);
    color: white;
    font-weight: bold;
}
.no-print {
    margin: 10px;
}
@media print {
    .no-print { display: none; }
}
</style>

</head>

<body>

<div class="facture-container">

<div class="brand-header">
    <div>
        <h1>FOUSSENY SERVICE</h1>
    </div>
    <div style="margin-left:auto;">
        <h2>DEVIS / FACTURE</h2>
        N° <input value="2026-001">
    </div>
</div>

<div class="slogan-bar">
Nous donnons un sens à votre maison avec les plafonds staff
</div>

<div class="content">

Client: <input placeholder="Nom client"><br><br>

<table id="table">
<thead>
<tr>
<th>Qté</th>
<th>Désignation</th>
<th>Prix</th>
<th>Montant</th>
</tr>
</thead>
<tbody>
</tbody>
</table>

<button onclick="addRow()" class="no-print">➕ Ajouter ligne</button>

<div class="totals-table">
<div class="total-row">
<span>Matériels</span>
<span id="materiel">0</span>
</div>

<div class="total-row">
<span>Main d'œuvre</span>
<input id="main" value="0" oninput="calc()">
</div>

<div class="total-row total-grand">
<span>TOTAL</span>
<span id="total">0</span>
</div>
</div>

<button onclick="window.print()" class="no-print">🖨️ Imprimer</button>

</div>

</div>

<script>

function addRow() {
    let table = document.querySelector("#table tbody");

    let row = document.createElement("tr");

    row.innerHTML = `
    <td><input type="number" value="1" oninput="calc()"></td>
    <td><input type="text"></td>
    <td><input type="number" value="0" oninput="calc()"></td>
    <td class="montant">0</td>
    `;

    table.appendChild(row);
}

function calc() {
    let rows = document.querySelectorAll("#table tbody tr");
    let totalMateriel = 0;

    rows.forEach(row => {
        let qty = row.children[0].children[0].value;
        let price = row.children[2].children[0].value;

        let montant = qty * price;
        row.children[3].innerText = montant.toLocaleString();

        totalMateriel += montant;
    });

    document.getElementById("materiel").innerText = totalMateriel.toLocaleString();

    let main = parseInt(document.getElementById("main").value) || 0;

    let total = totalMateriel + main;

    document.getElementById("total").innerText = total.toLocaleString() + " FCFA";
}

</script>

</body>
</html>
