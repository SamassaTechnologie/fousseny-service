<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Devis</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="print-area">

    <h1>FOUSSENY SERVICE</h1>
    <p>Kayes ATT Bougou</p>

    <h2>DEVIS</h2>

    <div class="info">
        <span>Client: <input type="text" id="client"></span>
        <span>Date: <input type="date"></span>
    </div>

    <table id="table">
        <tr>
            <th>Qté</th>
            <th>Désignation</th>
            <th>Prix Unit</th>
            <th>Montant</th>
        </tr>
    </table>

    <button onclick="addRow()" class="no-print">➕ Ajouter</button>

    <h3>Total : <span id="total">0</span> FCFA</h3>

    <div class="footer">
        <p>Arrêté le présent devis à la somme de : ____________ FCFA</p>
        <p>Signature Client __________________</p>
    </div>

</div>

<button onclick="window.print()" class="no-print">🖨️ Imprimer</button>

<script src="script.js"></script>

</body>
</html>
